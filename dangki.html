<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="./9oH_homepage.css" class="css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <title>Đăng kí</title>
</head>
<body>
        <header class="main-header">
        
        <div href="#" class="logo-container">
            <img src="./img/logo_9oH.jpg" alt="Logo Trống Đồng" class="logo-img">
            <span class="logo-text">Cuu Long History</span>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Sản phẩm</a></li>
                <li><a href="#">Dịch vụ</a></li>
                <li><a href="#">Tin tức</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
        </nav>

        <div class="action-btn">
        <a href="#" class="cart-icon">
            <img src="./img/GioHang.jpg" alt="Giỏ hàng">
    </a>

            <button class="login-btn" onclick="window.location.href='login.html'">Đăng nhập/ Đăng kí</button>
            <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
    </div>

    </header>

    <script>
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
    </script>


    <div id="wrapper">
        <form action="" id="form-login">
            <h1 class="form-heading">Form đăng kí</h1>
            <div class="form-group">
                <i class="far fa-user"></i>
                <input type="text" class="form-input" placeholder="Tên đăng nhập">
            </div>
            <div class="form-group">
                <i class="fas fa-phone"></i>
                <input type="tel" class="form-input" placeholder="Số điện thoại">
            </div>
            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" class="form-input" placeholder="Mật khẩu">
                <div id="eye">
                    <i class="fas fa-eye"></i>
                </div>
            </div>
            <input type="submit" value="Đăng Nhập" class="form-submit">
        </form>
    </div>
    
</body>
</html>
